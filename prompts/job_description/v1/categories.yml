# Role archetypes for job-description generation.
# Each entry is fed into gen_job_*.template via str.format_map, then the
# gen_job_description_output_format_suffix.prompt is appended.
# Niche-vs-standard is NOT specified here: the model classifies is_niche_role
# itself per the niche definition in the output-format suffix prompt.
roles:
  - role: "Software Engineer"
    industry: "Technology"
    experience_level: "Mid"
  - role: "Senior Backend Engineer"
    industry: "Fintech"
    experience_level: "Senior"
  - role: "Data Scientist"
